# ==================== 应用配置文件模板 ====================
# 使用说明：
#   1. 复制此文件为 application.yml
#   2. 将 YOUR_ 开头的占位符替换为你的真实配置
#   3. application.yml 已加入 .gitignore，不会被提交到 Git
# ==========================================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/springboot_zyt?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&useUnicode=true&allowPublicKeyRetrieval=true
    username: YOUR_MYSQL_USERNAME
    password: YOUR_MYSQL_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: YOUR_REDIS_PASSWORD_IF_ANY
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  # 网易163邮箱配置：用于发送注册验证码
  # 获取授权码：登录 mail.163.com → 设置 → POP3/SMTP/IMAP → 开启SMTP服务
  mail:
    host: smtp.163.com
    port: 465
    username: YOUR_163_EMAIL@163.com
    password: YOUR_SMTP_AUTH_CODE
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  type-aliases-package: com.zora.entity

jwt:
  secret: YOUR_JWT_SECRET_KEY_MUST_BE_AT_LEAST_32_CHARACTERS
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

# 微信开放平台/测试号配置
# 测试号获取: https://mp.weixin.qq.com/debug/cgi-bin/sandbox?t=sandbox/login
# 内网穿透: ngrok http 8080 → 将 https://xxxx.ngrok-free.app 填入测试号回调域名
wechat:
  app-id: ${WECHAT_APP_ID:xxx}
  app-secret: ${WECHAT_APP_SECRET:xxxx}
  callback-url: ${WECHAT_CALLBACK_URL:https://xxxxxx/user/wechat/callback}

# ==================== AI 扩展配置（Phase 1）====================
ai:
  api-key: ${AI_API_KEY:YOUR_DEEPSEEK_API_KEY}
  base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
  model-name: ${AI_MODEL_NAME:deepseek-v4-flash}
  temperature: ${AI_TEMPERATURE:0.7}
  max-tokens: ${AI_MAX_TOKENS:4096}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:120}

# ==================== AI Agent 智能体配置（Phase 3）====================
agent:
  tools:
    web-search:
      enabled: ${AGENT_TOOL_WEB_SEARCH:true}
    math:
      enabled: ${AGENT_TOOL_MATH:true}
    code-execution:
      enabled: ${AGENT_TOOL_CODE_EXEC:false}
      timeout-seconds: 5
      max-output-length: 10000
  tavily:
    api-key: ${TAVILY_API_KEY:YOUR_TAVILY_API_KEY}
    base-url: https://api.tavily.com/search
    timeout-seconds: 15
  multi-agent:
    enabled: ${AGENT_MULTI_AGENT:false}
    max-specialist-calls: 3
  memory:
    window-size: 20
    summary-trigger-count: 10
    summary-max-length: 300

version: "3.8"

services:
  # ==================== MySQL 8.0 ====================
  mysql:
    image: mysql:8.0
    container_name: auth-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-springboot_zyt}
      MYSQL_USER: ${MYSQL_USERNAME:-springuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-springpass}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./springboot/src/main/resources/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./springboot/src/main/resources/db/migration/V2__chat_tables.sql:/docker-entrypoint-initdb.d/02-chat-tables.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # ==================== Redis 7.x ====================
  redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    # REDIS_PASSWORD 为空时不启用认证；有值时追加 --requirepass
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  # ==================== Spring Boot 后端 ====================
  backend:
    build:
      context: ./springboot
      dockerfile: Dockerfile
    container_name: auth-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 数据库（通过 application.yml 中的 ${} 占位符注入）
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-springboot_zyt}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-springuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-springpass}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # 邮件
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # 微信（可选）
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      WECHAT_CALLBACK_URL: ${WECHAT_CALLBACK_URL:-}
      # AI（DeepSeek）
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com/v1}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-deepseek-chat}
      # JVM 调优
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "${BACKEND_PORT:-18080}:8080"
    networks:
      - app-network

  # ==================== Nginx 前端 ====================
  frontend:
    build:
      context: ./web/frontend
      dockerfile: Dockerfile
    container_name: auth-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - app-network

  # ==================== Adminer（数据库管理，可选）====================
  adminer:
    image: adminer:latest
    container_name: auth-adminer
    restart: unless-stopped
    profiles:
      - debug
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    networks:
      - app-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  app-network:
    driver: bridge

server {
    listen       80;
    server_name  localhost;

    # 客户端请求体最大 10MB（默认 1MB，文档上传需更大）
    client_max_body_size 10m;

    # Docker 内部 DNS（确保 nginx 在后端未就绪时也能启动）
    resolver 127.0.0.11 valid=30s;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # ==================== API 代理 → Spring Boot 后端 ====================
    location /user/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ==================== Knife4j / Swagger 文档代理 ====================
    location /doc.html {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /webjars/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    location /v3/api-docs {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    location /swagger-ui/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    # 精确匹配 /swagger-resources（无尾斜杠也要代理，避免 Nginx 301 重定向）
    location = /swagger-resources {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    location /swagger-resources/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # ==================== Actuator 健康检查代理 ====================
    location /actuator/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # ==================== 静态资源 ====================
    # Vite 构建产物带 hash，可以永久缓存
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # favicon
    location = /favicon.ico {
        root /usr/share/nginx/html;
        expires 1w;
        access_log off;
    }

    # ==================== SPA 回退 ====================
    # Vue Router HTML5 History 模式：所有非文件/非API 的路径返回 index.html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ==================== RAG 知识库代理（Phase 2）====================
    location /rag/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 10m;
    }

    # ==================== AI 对话代理（Phase 1）====================
    # SSE 流式响应：关闭缓冲确保实时推送
    location /ai/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # ==================== Agent 智能体代理（Phase 3）====================
    # SSE 流式 + 工具调用：超时更长（Agent 可能执行多轮推理和工具调用）
    location /agent/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
